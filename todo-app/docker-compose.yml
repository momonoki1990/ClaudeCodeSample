services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: todos
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/schema:/docker-entrypoint-initdb.d
      - ./db/mysql/my.cnf:/etc/mysql/conf.d/app.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db:3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: todos
      LOG_LEVEL: DEBUG
    volumes:
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      start_period: 10s
      start_interval: 1s
      interval: 600s
      timeout: 30s
      retries: 0

  front:
    build:
      context: ./front
    ports:
      - "5173:5173"
    environment:
      API_URL: http://api:8080
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./front:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
